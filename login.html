    <center>
    <div>

        <br>

    <script>
        function login(){
            var
            user=document.getElementById("username")
            .value;
            var
            pass=document.getElemetById("password")
            .value;

            if(user=="gowtham" && pass=="Gowtham.sgm"){
                window.location="home.html";
            }
            else{
                document.getElementById("msg").innerHTML="Wrong username or password";
            }
        }
    </script>
